<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LocalTwin Document Viewer</title>
    <link rel="icon" href="data:," />
    <style>
      :root {
        color: #17211c;
        background: #f6f8f7;
        font-family:
          Inter,
          Pretendard,
          "Apple SD Gothic Neo",
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        --green: #03c75a;
        --green-dark: #08703a;
        --ink: #17211c;
        --muted: #617067;
        --line: rgba(15, 23, 42, 0.12);
        --surface: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background:
          radial-gradient(circle at 10% 0%, rgba(3, 199, 90, 0.12), transparent 28%),
          linear-gradient(180deg, #fbfdfc 0%, #f4f7f5 100%);
      }

      a {
        color: var(--green-dark);
        font-weight: 800;
        text-decoration: none;
      }

      a:hover,
      a:focus-visible {
        text-decoration: underline;
      }

      .top-links {
        position: sticky;
        top: 0;
        z-index: 10;
        border-bottom: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.88);
        backdrop-filter: blur(18px);
      }

      .top-links__inner {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        width: min(980px, calc(100% - 32px));
        margin: 0 auto;
        min-height: 44px;
        color: var(--muted);
        font-size: 0.78rem;
      }

      .top-links__inner div {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .doc-shell {
        width: min(980px, calc(100% - 32px));
        margin: 0 auto;
        padding: 30px 0 70px;
      }

      .doc-card {
        border: 1px solid var(--line);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 18px 54px rgba(15, 23, 42, 0.08);
        padding: clamp(22px, 4vw, 42px);
      }

      .doc-path {
        margin: 0 0 16px;
        color: var(--muted);
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 0.78rem;
      }

      .content h1 {
        margin: 0 0 20px;
        color: #07120d;
        font-size: clamp(1.9rem, 3vw, 2.5rem);
        line-height: 1.15;
        letter-spacing: -0.02em;
        overflow-wrap: anywhere;
        text-wrap: balance;
        word-break: keep-all;
      }

      .content--compact-title h1 {
        font-size: clamp(1.75rem, 2.5vw, 2.25rem);
        line-height: 1.18;
        letter-spacing: -0.02em;
      }

      .content h2 {
        margin: 34px 0 12px;
        color: #07120d;
        font-size: 1.65rem;
        line-height: 1.22;
      }

      .content h3 {
        margin: 24px 0 10px;
        color: #07120d;
      }

      .content p,
      .content li {
        color: #34443c;
        line-height: 1.72;
      }

      .content ul,
      .content ol {
        padding-left: 1.3rem;
      }

      .content code {
        border-radius: 6px;
        background: #eef6f1;
        color: #075f32;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        padding: 0.12rem 0.28rem;
      }

      .content pre {
        overflow-x: auto;
        border-radius: 14px;
        background: #07120d;
        color: #dcefe6;
        padding: 16px;
      }

      .content pre code {
        background: transparent;
        color: inherit;
        padding: 0;
      }

      .content pre.mermaid {
        min-height: 220px;
        border: 1px solid var(--line);
        background: #f8fbf9;
        color: #07120d;
        white-space: pre;
      }

      .content pre.mermaid svg {
        display: block;
        max-width: 100%;
        height: auto;
        margin: 0 auto;
      }

      .content table {
        width: 100%;
        border-collapse: collapse;
        margin: 18px 0;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 12px;
      }

      .content th,
      .content td {
        border: 1px solid var(--line);
        padding: 10px;
        text-align: left;
        vertical-align: top;
      }

      .content th {
        background: #eef6f1;
        color: #1c3429;
      }

      .content blockquote {
        margin: 18px 0;
        border-left: 4px solid var(--green);
        background: #f2fbf6;
        color: #244237;
        padding: 12px 16px;
      }

      .document-toc {
        margin: 0 0 30px;
        border-top: 1px solid var(--line);
        border-bottom: 1px solid var(--line);
        padding: 18px 0;
      }

      .document-toc strong {
        display: block;
        margin-bottom: 12px;
        color: #07120d;
        font-size: 0.82rem;
      }

      .document-toc .document-flowchart {
        min-height: 170px;
        margin: 0 0 16px;
        padding: 12px;
      }

      .document-toc ol {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 7px 22px;
        margin: 0;
        padding: 0;
        list-style: none;
        counter-reset: document-section;
      }

      .document-toc li {
        min-width: 0;
        counter-increment: document-section;
      }

      .document-toc a {
        display: grid;
        grid-template-columns: 2rem minmax(0, 1fr);
        gap: 8px;
        align-items: baseline;
        color: #34443c;
        font-size: 0.88rem;
        font-weight: 700;
        text-decoration: none;
      }

      .document-toc a::before {
        content: counter(document-section, decimal-leading-zero);
        color: var(--green-dark);
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 0.72rem;
      }

      .document-toc a:hover,
      .document-toc a:focus-visible {
        color: var(--green-dark);
        text-decoration: underline;
      }

      .content .prototype-link {
        display: inline-flex;
        min-height: 42px;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        background: #07120d;
        color: #ffffff;
        padding: 0 16px;
      }

      .error {
        border: 1px solid rgba(239, 68, 68, 0.32);
        border-radius: 14px;
        background: #fff1f2;
        color: #991b1b;
        padding: 14px;
      }

      .home-hero {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(240px, 0.42fr);
        gap: 20px;
        align-items: end;
        margin-bottom: 24px;

        font-size: 1.02rem;

        background: #f4fbf7;
        padding: 16px;

        color: #07120d;

        background: #ffffff;
        padding: 16px;

      }

        color: var(--green-dark);

        font-size: 0.72rem;

      .home-action strong,

        font-size: 1rem;

        display: block;
        margin-top: 8px;
        color: var(--muted);
        font-size: 0.88rem;
        line-height: 1.55;

      .home-card-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .home-card ul {
        display: grid;
        gap: 8px;
        margin: 14px 0 0;
        padding: 0;
        list-style: none;

      .home-card li {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        border-top: 1px solid var(--line);
        padding-top: 8px;
      }

      .home-card em {
        color: var(--muted);
        font-size: 0.78rem;
        font-style: normal;
        font-weight: 700;
      }

      .home-map-grid {
        grid-template-columns: 1fr;
        margin-top: 22px;
      }

      .home-map pre {
        overflow-x: auto;
        margin: 12px 0 0;
        border-radius: 12px;
        background: #07120d;
        color: #dcefe6;
        font-size: 0.78rem;
        line-height: 1.55;
        padding: 12px;

      .document-tree {
        margin-top: 22px;

        border-radius: 16px;
        background: #ffffff;
        padding: 16px;

      .document-tree__header {

        font-size: 1.05rem;

        color: #07120d;

      .doc-folder summary:hover,
      .doc-folder summary:focus-visible {

      }

      .doc-folder summary small {
        margin-left: 8px;
        color: var(--muted);
        font-size: 0.76rem;
        font-weight: 700;
        line-height: 1.45;
      }

      .doc-files {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 6px 16px;
        margin: 0 0 12px 22px;
        padding: 0;
        list-style: none;
      }

      .doc-files a {
        display: block;
        overflow-wrap: anywhere;
        border-radius: 6px;
        padding: 7px 8px;
        color: #20332a;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 0.78rem;
      }

        color: var(--green-dark);

        .home-hero,
        .home-actions,
        .home-card-grid,
        .home-map-grid {
          grid-template-columns: 1fr;
        }

        .document-toc ol {
          grid-template-columns: 1fr;
        }

        .doc-folder summary small {
          display: block;
          margin: 4px 0 0 20px;
        }

        .document-tree__header {
          align-items: start;
          flex-direction: column;
        }

        .doc-files {
          grid-template-columns: 1fr;
        }
      }

    <script>
      const params = new URLSearchParams(window.location.search);
      const rawDocParam = params.get("doc") || "Home.md";
      const requestedDoc = normalizeDoc(rawDocParam);
      const content = document.querySelector("#content");
      const docPath = document.querySelector("#doc-path");
      const rawLink = document.querySelector("#raw-link");

      function safeDecode(value) {
        try {
          return decodeURIComponent(value);
        } catch {
          return value;
        }
      }

      function normalizeDoc(input, depth = 0) {
        let value = safeDecode(String(input || "Home.md")).trim();
        const nestedMatch = value.match(/(?:^|\/|\.\/)doc-viewer\.html\?doc=(.+)$/);
        if (nestedMatch && depth < 3) {
          return normalizeDoc(nestedMatch[1], depth + 1);
        }
        if (
          value.includes("?") ||
          value.includes("#") ||
          value.includes("://") ||
          value.includes("\0")
        ) {
          return "Home.md";
        }
        value = value.replace(/^\.\//, "");
        if (!value.endsWith(".md")) return "Home.md";
        const parts = value.replace(/\\/g, "/").split("/").filter(Boolean);
        const normalized = [];
        let leadingParents = 0;
        for (const part of parts) {
          if (part === ".") continue;
          if (part === "..") {
            leadingParents += 1;
            if (leadingParents > 1) return "Home.md";
            normalized.push(part);
            continue;
          }
          leadingParents = 0;
          normalized.push(part);
        }
        const normalizedValue = normalized.join("/");
        return normalizedValue || "Home.md";
      }

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function docDir(doc) {
        const index = doc.lastIndexOf("/");
        return index === -1 ? "" : doc.slice(0, index + 1);
      }

      function normalizeRelative(baseDoc, href) {
        if (/^(https?:|mailto:|#)/.test(href)) return href;
        const nestedViewer = href.match(/(?:^|\.\/)doc-viewer\.html\?doc=(.+)$/);
        if (nestedViewer) {
          return `./doc-viewer.html?doc=${encodeURIComponent(normalizeDoc(nestedViewer[1]))}`;
        }
        if (href.includes("?") || href.includes("#")) return href;
        if (href.endsWith(".html")) return href;
        if (!href.endsWith(".md")) return href;
        const stack = docDir(baseDoc).split("/").filter(Boolean);
        href.split("/").forEach((part) => {
          if (!part || part === ".") return;
          if (part === "..") stack.push("..");
          else stack.push(part);
        });
        return `./doc-viewer.html?doc=${encodeURIComponent(stack.join("/"))}`;
      }

      function inline(markdown, currentDoc) {
        let html = escapeHtml(markdown);
        html = html.replace(/`([^`]+)`/g, "<code>$1</code>");
        html = html.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
        html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_, label, href) => {
          return `<a href="${escapeHtml(normalizeRelative(currentDoc, href))}">${label}</a>`;
        });
        return html;
      }

      function renderTable(lines, currentDoc) {
        const rows = lines.map((line) =>
          line
            .trim()
            .replace(/^\||\|$/g, "")
            .split("|")
            .map((cell) => cell.trim()),
        );
        const header = rows[0] || [];
        const body = rows.slice(2);
        return `<table><thead><tr>${header
          .map((cell) => `<th>${inline(cell, currentDoc)}</th>`)
          .join("")}</tr></thead><tbody>${body
          .map(
            (row) =>
              `<tr>${row.map((cell) => `<td>${inline(cell, currentDoc)}</td>`).join("")}</tr>`,
          )
          .join("")}</tbody></table>`;
      }

      function renderMarkdown(markdown, currentDoc) {
        const lines = markdown.replace(/\r\n/g, "\n").split("\n");
        const blocks = [];
        let paragraph = [];
        let list = [];
        let table = [];
        let code = [];
        let codeLanguage = "";
        let inCode = false;

        function flushParagraph() {
          if (!paragraph.length) return;
          blocks.push(`<p>${inline(paragraph.join(" "), currentDoc)}</p>`);
          paragraph = [];
        }

        function flushList() {
          if (!list.length) return;
          blocks.push(
            `<ul>${list.map((item) => `<li>${inline(item, currentDoc)}</li>`).join("")}</ul>`,
          );
          list = [];
        }

        function flushTable() {
          if (!table.length) return;
          blocks.push(renderTable(table, currentDoc));
          table = [];
        }

        for (const line of lines) {
          if (line.startsWith("```")) {
            if (inCode) {
              if (codeLanguage === "mermaid") {
                blocks.push(`<pre class="mermaid">${escapeHtml(code.join("\n"))}</pre>`);
              } else {
                blocks.push(`<pre><code>${escapeHtml(code.join("\n"))}</code></pre>`);
              }
              code = [];
              codeLanguage = "";
              inCode = false;
            } else {
              flushParagraph();
              flushList();
              flushTable();
              inCode = true;
              codeLanguage = line.slice(3).trim().toLowerCase();
            }
            continue;
          }
          if (inCode) {
            code.push(line);
            continue;
          }
          if (!line.trim()) {
            flushParagraph();
            flushList();
            flushTable();
            continue;
          }
          if (/^\|.+\|$/.test(line.trim())) {
            flushParagraph();
            flushList();
            table.push(line);
            continue;
          }
          flushTable();
          const heading = line.match(/^(#{1,4})\s+(.+)$/);
          if (heading) {
            flushParagraph();
            flushList();
            const level = heading[1].length;
            blocks.push(`<h${level}>${inline(heading[2], currentDoc)}</h${level}>`);
            continue;
          }
          const listItem = line.match(/^[-*]\s+(.+)$/);
          if (listItem) {
            flushParagraph();
            list.push(listItem[1]);
            continue;
          }
          if (line.startsWith("> ")) {
            flushParagraph();
            flushList();
            blocks.push(`<blockquote>${inline(line.slice(2), currentDoc)}</blockquote>`);
            continue;
          }
          paragraph.push(line.trim());
        }

        flushParagraph();
        flushList();
        flushTable();
        return blocks.join("\n");
      }

      function insertDocumentToc() {
        const headings = Array.from(content.querySelectorAll("h2"));
        if (!headings.length) return;

        const labels = headings.map((heading, index) => {
          const id = `section-${index + 1}`;
          const label = heading.textContent.trim();
          heading.id = id;
          return { id, label };
        });

        const items = labels.map(
          ({ id, label }) => `<li><a href="#${id}">${escapeHtml(label)}</a></li>`,
        );
        const mermaidNode = ({ label }, index) => {
          const safeLabel = label.replace(/["\[\]{}]/g, "").trim();
          return `section${index + 1}["${safeLabel}"]`;
        };
        const diagramLines = [];

        if (labels.length <= 4) {
          diagramLines.push("flowchart LR");
          diagramLines.push(`  ${labels.map(mermaidNode).join(" --> ")}`);
        } else {
          const rowSize = 4;
          const rows = Array.from({ length: Math.ceil(labels.length / rowSize) }, (_, rowIndex) =>
            labels.slice(rowIndex * rowSize, (rowIndex + 1) * rowSize),
          );
          diagramLines.push("flowchart TB");
          rows.forEach((row, rowIndex) => {
            const offset = rowIndex * rowSize;
            diagramLines.push(`  subgraph row${rowIndex + 1}[" "]`);
            diagramLines.push("    direction LR");
            diagramLines.push(
              `    ${row.map((item, index) => mermaidNode(item, offset + index)).join(" --> ")}`,
            );
            diagramLines.push("  end");
            diagramLines.push(`  style row${rowIndex + 1} fill:transparent,stroke:transparent`);
          });
          rows.slice(0, -1).forEach((row, rowIndex) => {
            const lastIndex = rowIndex * rowSize + row.length;
            diagramLines.push(`  section${lastIndex} --> section${lastIndex + 1}`);
          });
        }

        const toc = document.createElement("nav");
        toc.className = "document-toc";
        toc.setAttribute("aria-label", "문서 흐름");
        toc.innerHTML = `<strong>문서 흐름</strong><pre class="mermaid document-flowchart">${escapeHtml(
          diagramLines.join("\n"),
        )}</pre><ol>${items.join("")}</ol>`;

        const title = content.querySelector("h1");
        if (title) {
          title.insertAdjacentElement("afterend", toc);
        } else {
          content.prepend(toc);
        }
      }

      async function renderMermaidDiagrams() {
        const diagrams = content.querySelectorAll("pre.mermaid");
        if (!diagrams.length || !window.mermaid) return;
        window.mermaid.initialize({
          startOnLoad: false,
          securityLevel: "strict",
          theme: "base",
          themeVariables: {
            primaryColor: "#eef8f1",
            primaryTextColor: "#07120d",
            primaryBorderColor: "#62ad7d",
            lineColor: "#60746a",
            secondaryColor: "#edf4ff",
            tertiaryColor: "#ffffff",
            fontFamily: "Inter, Pretendard, system-ui, sans-serif",
          },
        });
        try {
          await window.mermaid.run({ nodes: diagrams });
        } catch (error) {
          console.warn("Mermaid render failed; raw diagram kept visible.", error);
        }
      }

      async function loadDocument() {
        const canonicalUrl = `./doc-viewer.html?doc=${encodeURIComponent(requestedDoc)}`;
        if (rawDocParam !== requestedDoc && window.history.replaceState) {
          window.history.replaceState(null, "", canonicalUrl);
        }
        docPath.textContent = requestedDoc;
        rawLink.href = requestedDoc;
        content.classList.toggle(
          "content--compact-title",
          requestedDoc.endsWith("/features/market-map-experience.md"),
        );
        if (requestedDoc === "Home.md") {
          content.innerHTML = renderHome();
          return;
        }
        try {
          const response = await fetch(requestedDoc, { cache: "no-store" });
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }
          const markdown = await response.text();
          content.innerHTML = renderMarkdown(markdown, requestedDoc);
          insertDocumentToc();
          await renderMermaidDiagrams();
        } catch (error) {
          content.innerHTML = `<div class="error">문서를 불러오지 못했습니다: ${escapeHtml(
            requestedDoc,
          )}<br />로컬에서는 repository root를 정적 서버로 열어야 합니다.</div>`;
        }
      }

      loadDocument();
    </script>
